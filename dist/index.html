<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scramble Royale</title>
  <script type="module" crossorigin src="/caesr-code/assets/index-DCUKUIvx.js"></script>
  <link rel="stylesheet" crossorigin href="/caesr-code/assets/index-GWyzu3-Z.css">
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <!-- ===================== MENU SCREEN ===================== -->
    <div id="menu-screen" class="screen">
      <div class="menu-panel">
        <h1 class="game-title"><span class="t-scramble">SCRAMBLE</span><span class="t-royale">ROYALE</span></h1>
        <p class="subtitle">last blob standing wins</p>

        <div class="menu-field">
          <label for="name-input">YOUR NAME</label>
          <input id="name-input" maxlength="14" placeholder="Blob" autocomplete="off" />
        </div>

        <div class="menu-row">
          <button id="host-btn" class="btn btn-primary">HOST GAME</button>
          <button id="join-btn" class="btn btn-secondary">JOIN GAME</button>
        </div>

        <div id="join-field" class="menu-field hidden">
          <label for="room-input">ROOM CODE</label>
          <input id="room-input" maxlength="6" placeholder="ABC123" autocomplete="off" />
          <button id="join-confirm-btn" class="btn btn-primary">CONNECT</button>
        </div>

        <div id="room-display" class="room-display hidden">
          <span>ROOM CODE</span>
          <strong id="room-code-text">------</strong>
          <p>share this code — waiting for blobs to join</p>
        </div>

        <div id="lobby-list" class="lobby-list"></div>

        <button id="start-btn" class="btn btn-start hidden">START (<span id="player-count">1</span> PLAYERS)</button>
        <p id="status-text" class="status-text"></p>
      </div>
    </div>

    <!-- ===================== HUD ===================== -->
    <div id="hud" class="hidden">
      <div class="hud-top">
        <div class="hud-players-left">
          <span id="players-remaining">--</span> QUALIFYING
        </div>
        <div class="hud-level-name" id="level-name">LEVEL</div>
        <div class="hud-timer" id="hud-timer">0:00</div>
      </div>
      <div id="mobile-controls" class="hidden">
        <div id="joystick-zone"></div>
        <button id="jump-btn">JUMP</button>
        <button id="dive-btn">DIVE</button>
      </div>
    </div>

    <!-- ===================== RESULT BANNER ===================== -->
    <div id="result-banner" class="result-banner hidden">
      <h2 id="result-title"></h2>
      <p id="result-sub"></p>
    </div>

    <!-- ===================== FINAL SCREEN ===================== -->
    <div id="final-screen" class="screen hidden">
      <div class="menu-panel">
        <h1 class="game-title final-crown">👑</h1>
        <h2 id="final-winner-text">WINNER WINNER</h2>
        <button id="play-again-btn" class="btn btn-primary">BACK TO MENU</button>
      </div>
    </div>
  </div>

</body>
</html>
